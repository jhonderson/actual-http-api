name: Update Version

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write

jobs:
  update-version:
    if: github.actor != 'github-actions'
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      # 2. Set up Node
      - uses: actions/setup-node@v3
        with:
          node-version: '22'

      # 3. Install dependencies
      - run: npm ci

      # 4. Determine target version from dependency
      - name: Get versions
        id: versions
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          TARGET_VERSION=$(node -p "require('./package.json').dependencies['@actual-app/api'].replace('^','')")

          echo "Current version: $CURRENT_VERSION"
          echo "Target version: $TARGET_VERSION"

          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
          echo "TARGET_VERSION=$TARGET_VERSION" >> $GITHUB_ENV

          if [ "$CURRENT_VERSION" = "$TARGET_VERSION" ]; then
            echo "SKIP=true" >> $GITHUB_ENV
          else
            echo "SKIP=false" >> $GITHUB_ENV
          fi

      # 5. Update package version if needed
      - name: Update main package version
        if: env.SKIP != 'true'
        run: npm version ${{ env.TARGET_VERSION }} --no-git-tag-version

      # 6. Commit & push changes if needed
      - name: Commit changes
        if: env.SKIP != 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ env.TARGET_VERSION }}"
          git push

      # 7. Log skip
      - name: Nothing to update
        if: env.SKIP == 'true'
        run: echo "Version already up to date. Nothing to do."